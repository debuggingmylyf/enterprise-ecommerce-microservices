# Standalone compose for product-service development.
# Secrets and config are loaded from the root .env file.
# Run from the project root: docker compose -f product-service/compose.yaml up --build
# Or from this directory:    docker compose --env-file ../.env up --build

services:
  postgres:
    image: postgres:17-alpine
    container_name: product-postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${PRODUCT_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PRODUCT_POSTGRES_PORT}:5432"
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PRODUCT_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-ecommerce/product-service:latest
    container_name: product-service
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PRODUCT_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      CONFIG_SERVER_URI: ""
    ports:
      - "${PRODUCT_SERVICE_PORT}:8082"
    restart: unless-stopped

volumes:
  product-postgres-data:
